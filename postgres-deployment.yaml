apiVersion: apps/v1
kind: Deployment
metadata:
  name: testaudisoft-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testaudisoft-postgres
  template:
    metadata:
      labels:
        app: testaudisoft-postgres
    spec:
      containers:
        - name: testaudisoft-postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: testaudisoft-postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: testaudisoft-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: testaudisoft-postgres-secret
                  key: POSTGRES_PASSWORD